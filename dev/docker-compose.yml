services:
  fe:
    build: ./nginx
    ports:
      - "80:80"
    volumes:
      - /app/fe/dist:/usr/share/nginx/html/fe:ro
    depends_on:
      - be
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  be:
    image: us-east1-docker.pkg.dev/v1-mvp/be-dev/be:latest
    ports:
      - "8080:8080"
    env_file:
      - /app/be/.env
    depends_on:
      - db
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    env_file:
      - /app/be/.env
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml

volumes:
  mysql-data:
