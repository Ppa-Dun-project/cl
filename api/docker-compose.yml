services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /app/api/frontend/dist:/usr/share/nginx/html/api:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: us-east1-docker.pkg.dev/v1-mvp/api/api:latest
    ports:
      - "8000:8000"
    env_file:
      - /app/api/.env
    depends_on:
      - db
    restart: unless-stopped

  backend:
    image: us-east1-docker.pkg.dev/v1-mvp/api/backend:latest
    ports:
      - "8001:8000"
    env_file:
      - /app/api/.env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    env_file:
      - /app/api/.env
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    restart: unless-stopped

volumes:
  certbot-webroot:
  certbot-certs:
  mysql-data:
