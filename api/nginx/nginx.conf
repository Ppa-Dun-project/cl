# HTTP → HTTPS redirect + Certbot challenge
server {
    listen 80;
    server_name api.ppa-dun.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    ### else redrect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name api.ppa-dun.site;

    ssl_certificate /etc/letsencrypt/live/api.ppa-dun.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.ppa-dun.site/privkey.pem;

    # ── Internal-only — block external access ────────────────────────────
    location /internal/ {
        return 403;
    }

    location /player/recalculate {
        return 403;
    }

    location /admin/ {
        return 403;
    }

    location / {
        root /usr/share/nginx/html/api;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /health {
        resolver 127.0.0.11 valid=30s;
        set $backend http://api:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /demo/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://api:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /player {
        resolver 127.0.0.11 valid=30s;
        set $backend http://api:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
